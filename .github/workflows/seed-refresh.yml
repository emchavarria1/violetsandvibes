name: Refresh Seed Engagement

on:
  workflow_dispatch:
    inputs:
      rotation_key:
        description: Optional rotation key override, e.g. 20260315
        required: false
        type: string
  schedule:
    - cron: "15 8 * * *"

jobs:
  refresh-seed-engagement:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ secrets.SEED_SUPABASE_URL != '' && secrets.SEED_SUPABASE_SERVICE_ROLE_KEY != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh seeded engagement in Supabase
        run: npm run seed:refresh -- --target=supabase
        env:
          SUPABASE_URL: ${{ secrets.SEED_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SEED_SUPABASE_SERVICE_ROLE_KEY }}
          SEED_ROTATION_KEY: ${{ github.event.inputs.rotation_key }}
