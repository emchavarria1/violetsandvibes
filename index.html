    <style>
      html, body {
        background: #f8fafc;
        color: #0f172a;
      }
      html.dark, html.dark body {
        background: #020617;
        color: #f8fafc;
      }
      html[data-theme-ready="0"] *,
      html[data-theme-ready="0"] *::before,
      html[data-theme-ready="0"] *::after {
        transition: none !important;
        animation: none !important;
      }
    </style>

    <script>
      (function () {
        var root = document.documentElement;
        root.setAttribute("data-theme-ready", "0");

        var theme = "light";
        try {
          var rawPrefs = localStorage.getItem("vv_app_preferences");
          var parsedPrefs = rawPrefs ? JSON.parse(rawPrefs) : null;

          if (parsedPrefs && typeof parsedPrefs.darkMode === "boolean") {
            theme = parsedPrefs.darkMode ? "dark" : "light";
          } else {
            var savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark" || savedTheme === "light") {
              theme = savedTheme;
            } else if (
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
            ) {
              theme = "dark";
            }
          }

          if (parsedPrefs) {
            root.classList.toggle("vv-reduced-motion", !!parsedPrefs.reducedMotion);
            root.classList.toggle("vv-high-contrast", !!parsedPrefs.highContrast);
            root.classList.toggle("vv-large-text", !!parsedPrefs.largeText);
            root.setAttribute("data-autoplay-videos", parsedPrefs.autoPlayVideos ? "true" : "false");
            root.setAttribute("data-sound-effects", parsedPrefs.soundEffects ? "true" : "false");
          }
        } catch (_) {}

        root.classList.remove("light", "dark");
        root.classList.add(theme);
        root.setAttribute("data-theme-preapplied", "1");

        requestAnimationFrame(function () {
          root.setAttribute("data-theme-ready", "1");
        });
      })();
    </script>
    <script>
      (function () {
        var reloadKey = "vv_chunk_reload_attempted";

        function shouldRecoverChunkError(message) {
          if (!message) return false;
          return (
            message.indexOf("Failed to fetch dynamically imported module") !== -1 ||
            message.indexOf("Importing a module script failed") !== -1 ||
            message.indexOf("error loading dynamically imported module") !== -1 ||
            message.indexOf("Unable to preload CSS") !== -1
          );
        }

        function recoverOnce() {
          try {
            if (sessionStorage.getItem(reloadKey) === "1") return;
            sessionStorage.setItem(reloadKey, "1");
          } catch (_) {}

          window.location.replace(window.location.href.split("#")[0]);
        }

        window.addEventListener("load", function () {
          try {
            sessionStorage.removeItem(reloadKey);
          } catch (_) {}
        });

        window.addEventListener(
          "error",
          function (event) {
            var target = event && event.target;
            if (target && target.tagName === "SCRIPT") {
              recoverOnce();
              return;
            }

            var message = event && typeof event.message === "string" ? event.message : "";
            if (shouldRecoverChunkError(message)) {
              recoverOnce();
            }
          },
          true
        );

        window.addEventListener("unhandledrejection", function (event) {
          var reason = event && event.reason;
          var message =
            typeof reason === "string"
              ? reason
              : reason && typeof reason.message === "string"
                ? reason.message
                : "";

          if (shouldRecoverChunkError(message)) {
            recoverOnce();
          }
        });
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
